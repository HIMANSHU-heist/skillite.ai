<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SKILLITE AI Mentor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-base: #080c14;
            --bg-surface: #0d1422;
            --bg-card: #111a2e;
            --bg-input: #0f1929;
            --accent: #22c55e;
            --accent-dim: rgba(34, 197, 94, 0.12);
            --accent-glow: rgba(34, 197, 94, 0.3);
            --text-primary: #e8edf7;
            --text-secondary: #7a8ba8;
            --text-muted: #3d5068;
            --border: rgba(255,255,255,0.06);
            --bubble-user: #22c55e;
            --bubble-ai: #131f35;
            --radius-msg: 18px;
            --font-display: 'Syne', sans-serif;
            --font-body: 'DM Sans', sans-serif;
            --header-h: 64px;
            --footer-h: 80px;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-base);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            height: 100dvh;
            position: relative;
        }

        /* ── ambient background ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 20% 10%, rgba(34,197,94,0.06) 0%, transparent 70%),
                radial-gradient(ellipse 50% 60% at 80% 90%, rgba(56,189,248,0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── HEADER ── */
        header {
            position: relative;
            z-index: 10;
            height: var(--header-h);
            min-height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: rgba(13, 20, 34, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-logo {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            box-shadow: 0 0 16px var(--accent-glow);
        }

        .header-title {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: clamp(14px, 3.5vw, 18px);
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }

        .header-title span {
            color: var(--accent);
        }

        .header-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.8); }
        }

        /* ── CHAT AREA ── */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 16px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            position: relative;
            z-index: 1;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        /* custom scrollbar */
        #chat-container::-webkit-scrollbar { width: 4px; }
        #chat-container::-webkit-scrollbar-track { background: transparent; }
        #chat-container::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 4px; }

        /* date divider */
        .date-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 12px 0 8px;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .date-divider::before,
        .date-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* message row */
        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            animation: msgIn 0.25s cubic-bezier(0.34,1.56,0.64,1) both;
        }

        .msg-row.user { flex-direction: row-reverse; }
        .msg-row.ai   { flex-direction: row; }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(12px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* avatar */
        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .avatar.ai-av {
            background: linear-gradient(135deg, #1d4ed8 0%, #22c55e 100%);
            box-shadow: 0 0 12px rgba(34,197,94,0.25);
        }

        .avatar.user-av {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
        }

        /* bubble */
        .message {
            max-width: min(72%, 480px);
            padding: 12px 16px;
            border-radius: var(--radius-msg);
            font-size: clamp(13px, 3.5vw, 15px);
            line-height: 1.55;
            white-space: pre-wrap;
            word-break: break-word;
            position: relative;
        }

        .message.user {
            background: var(--bubble-user);
            color: #061a0d;
            font-weight: 500;
            border-bottom-right-radius: 5px;
            box-shadow: 0 4px 20px rgba(34,197,94,0.2);
        }

        .message.ai {
            background: var(--bubble-ai);
            color: var(--text-primary);
            border-bottom-left-radius: 5px;
            border: 1px solid rgba(255,255,255,0.07);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        /* typing indicator */
        .typing-bubble {
            background: var(--bubble-ai);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: var(--radius-msg);
            border-bottom-left-radius: 5px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .typing-bubble span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            display: inline-block;
            animation: typingBounce 1.2s ease-in-out infinite;
        }
        .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
        .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
            40% { transform: translateY(-6px); opacity: 1; }
        }

        /* ── INPUT AREA — ChatGPT/Claude style ── */
        #input-area {
            position: relative;
            z-index: 10;
            padding: 10px 16px 14px;
            background: transparent;
        }

        /* gradient fade above input — masks chat content smoothly */
        #input-area::before {
            content: '';
            position: absolute;
            top: -48px;
            left: 0; right: 0;
            height: 48px;
            background: linear-gradient(to bottom, transparent, var(--bg-base));
            pointer-events: none;
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: #111c2f;
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 20px;
            padding: 10px 10px 10px 18px;
            box-shadow:
                0 8px 32px rgba(0,0,0,0.45),
                0 2px 8px rgba(0,0,0,0.3),
                inset 0 1px 0 rgba(255,255,255,0.04);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: rgba(34,197,94,0.35);
            box-shadow:
                0 8px 32px rgba(0,0,0,0.45),
                0 0 0 3px rgba(34,197,94,0.07),
                inset 0 1px 0 rgba(255,255,255,0.04);
        }

        #message {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: clamp(13px, 3.8vw, 15px);
            line-height: 1.55;
            caret-color: var(--accent);
            min-width: 0;
            resize: none;
            overflow-y: auto;
            max-height: 160px;
            padding: 4px 0;
            scrollbar-width: thin;
            scrollbar-color: var(--text-muted) transparent;
        }

        #message::-webkit-scrollbar { width: 3px; }
        #message::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }

        #message::placeholder {
            color: var(--text-muted);
        }

        #send-btn {
            width: 38px;
            height: 38px;
            flex-shrink: 0;
            border-radius: 12px;
            background: var(--accent);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s, background 0.15s, opacity 0.15s;
            align-self: flex-end;
        }

        #send-btn:hover { background: #16a34a; transform: scale(1.06); }
        #send-btn:active { transform: scale(0.93); }
        #send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; background: var(--text-muted); }

        #send-btn svg {
            width: 17px;
            height: 17px;
            fill: none;
            stroke: white;
            stroke-width: 2.3;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .input-hint {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 8px;
            letter-spacing: 0.02em;
        }

        /* ── RESPONSIVE ── */

        /* Tablet */
        @media (min-width: 600px) {
            #chat-container { padding: 24px 24px 8px; }
            .message { font-size: 15px; }
            #input-area { padding: 8px 24px 18px; }
            .input-wrapper { border-radius: 22px; padding: 12px 12px 12px 20px; }
            #send-btn { width: 40px; height: 40px; }
        }

        /* Desktop */
        @media (min-width: 900px) {
            body { align-items: center; background: #05080f; }
            body::before {
                background:
                    radial-gradient(ellipse 40% 50% at 25% 30%, rgba(34,197,94,0.07) 0%, transparent 60%),
                    radial-gradient(ellipse 35% 40% at 75% 70%, rgba(56,189,248,0.05) 0%, transparent 60%);
            }

            .app-shell {
                width: 100%;
                max-width: 780px;
                height: 100dvh;
                display: flex;
                flex-direction: column;
                position: relative;
                background: var(--bg-base);
                box-shadow: 0 0 80px rgba(0,0,0,0.6), 0 0 1px rgba(255,255,255,0.06);
            }

            #chat-container { padding: 28px 32px 8px; }
            .message { max-width: min(68%, 520px); font-size: 15px; }
            #input-area { padding: 8px 32px 20px; }
            #send-btn { width: 42px; height: 42px; border-radius: 13px; }
            .input-wrapper { border-radius: 24px; }
        }

        /* Safe area for notched phones */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            #input-area {
                padding-bottom: calc(14px + env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>

<div class="app-shell">
    <!-- HEADER -->
    <header>
        <div class="header-brand">
            <div class="header-logo">🚀</div>
            <div class="header-title">SKILLITE <span>AI</span></div>
        </div>
        <div class="header-status">
            <div class="status-dot"></div>
            Career Mentor
        </div>
    </header>

    <!-- CHAT -->
    <div id="chat-container">
        <div class="date-divider">Today</div>
    </div>

    <!-- INPUT -->
    <div id="input-area">
        <div class="input-wrapper">
            <textarea id="message" rows="1" placeholder="Ask me anything about your career…" autocomplete="off" autocorrect="off" spellcheck="false"></textarea>
            <button id="send-btn" onclick="sendMessage()" title="Send">
                <svg viewBox="0 0 24 24">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
        <div class="input-hint">Press <kbd style="background:rgba(255,255,255,0.07);padding:1px 5px;border-radius:4px;font-size:10px;">Enter</kbd> to send &nbsp;·&nbsp; <kbd style="background:rgba(255,255,255,0.07);padding:1px 5px;border-radius:4px;font-size:10px;">Shift+Enter</kbd> for new line</div>
    </div>
</div>

<script>
    let session_id = localStorage.getItem("session_id");
    if (!session_id) {
        session_id = Date.now().toString();
        localStorage.setItem("session_id", session_id);
    }

    let isTyping = false;

    function addMessage(content, type) {
        const container = document.getElementById("chat-container");

        const row = document.createElement("div");
        row.classList.add("msg-row", type);

        const avatar = document.createElement("div");
        avatar.classList.add("avatar", type === "ai" ? "ai-av" : "user-av");
        avatar.textContent = type === "ai" ? "✦" : "👤";

        const bubble = document.createElement("div");
        bubble.classList.add("message", type);
        bubble.textContent = content;

        if (type === "ai") {
            row.appendChild(avatar);
            row.appendChild(bubble);
        } else {
            row.appendChild(bubble);
            row.appendChild(avatar);
        }

        container.appendChild(row);
        container.scrollTop = container.scrollHeight;
    }

    function showTyping() {
        const container = document.getElementById("chat-container");

        const row = document.createElement("div");
        row.classList.add("msg-row", "ai");
        row.id = "typing-row";

        const avatar = document.createElement("div");
        avatar.classList.add("avatar", "ai-av");
        avatar.textContent = "✦";

        const bubble = document.createElement("div");
        bubble.classList.add("typing-bubble");
        bubble.innerHTML = "<span></span><span></span><span></span>";

        row.appendChild(avatar);
        row.appendChild(bubble);
        container.appendChild(row);
        container.scrollTop = container.scrollHeight;
    }

    function hideTyping() {
        const el = document.getElementById("typing-row");
        if (el) el.remove();
    }

    async function sendMessage(initialMessage = null) {
        if (isTyping) return;

        const input = document.getElementById("message");
        const btn = document.getElementById("send-btn");
        const message = initialMessage ? initialMessage : input.value.trim();
        if (!message) return;

        if (!initialMessage) {
            addMessage(message, "user");
            input.value = "";
            input.style.height = "auto";
        }

        isTyping = true;
        btn.disabled = true;
        showTyping();

        try {
            const res = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message, session_id })
            });
            const data = await res.json();
            hideTyping();
            addMessage(data.reply, "ai");
        } catch (e) {
            hideTyping();
            addMessage("Something went wrong. Please try again.", "ai");
        }

        isTyping = false;
        btn.disabled = false;
        input.focus();
    }

    document.getElementById("message").addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // auto-grow textarea
    document.getElementById("message").addEventListener("input", function () {
        this.style.height = "auto";
        this.style.height = Math.min(this.scrollHeight, 160) + "px";
    });

    window.onload = function () {
        sendMessage("hi");
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>SKILLITE AI Mentor</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: white;
        }

        header {
            padding: 15px;
            background: #111827;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .message {
            max-width: 70%;
            padding: 12px 15px;
            margin: 8px 0;
            border-radius: 12px;
            white-space: pre-wrap;
            line-height: 1.4;
        }

        .user {
            background: #22c55e;
            align-self: flex-end;
            color: black;
        }

        .ai {
            background: #1e293b;
            align-self: flex-start;
        }

        #input-area {
            display: flex;
            padding: 15px;
            background: #111827;
        }

        #message {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            margin-left: 10px;
            padding: 10px 18px;
            background: #22c55e;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

<header>🚀 SKILLITE AI Career Mentor</header>

<div id="chat-container"></div>

<div id="input-area">
    <input type="text" id="message" placeholder="Type your answer here..." />
    <button onclick="sendMessage()">Send</button>
</div>

<script>

let session_id = Date.now().toString();

function addMessage(content, type) {
    const chatContainer = document.getElementById("chat-container");

    const messageDiv = document.createElement("div");
    messageDiv.classList.add("message", type);
    messageDiv.textContent = content;

    chatContainer.appendChild(messageDiv);
    chatContainer.scrollTop = chatContainer.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById("message");
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    addMessage("Typing...", "ai");

    const res = await fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: message,
            session_id: session_id
        })
    });

    const data = await res.json();

    const chatContainer = document.getElementById("chat-container");
    chatContainer.removeChild(chatContainer.lastChild); // remove typing

    addMessage(data.reply, "ai");
}

// Send message on Enter key
document.getElementById("message").addEventListener("keypress", function (e) {
    if (e.key === "Enter") {
        e.preventDefault();
        sendMessage();
    }
});

// Initial AI greeting
window.onload = function () {
    addMessage("Hi 👋 I am SKILLITE AI Mentor.\nTell me about:\n1️⃣ Your current field\n2️⃣ Your career goal\n3️⃣ Skills you have\n4️⃣ Hours per day you can study\n5️⃣ Free or paid preference\n\nReply in one message and I will create your roadmap 🚀", "ai");
};

</script>

</body>
</html>
